name: Eclipse Target Compatibility Matrix

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_file: targets/2024-06.target
            resolve_with_ee_constraints: true
          - target_file: targets/2024-09.target
            resolve_with_ee_constraints: true
          - target_file: targets/2024-12.target
            resolve_with_ee_constraints: true
          - target_file: targets/2025-03.target
            resolve_with_ee_constraints: false
          - target_file: targets/2025-06.target
            resolve_with_ee_constraints: false
          - target_file: targets/2025-09.target
            resolve_with_ee_constraints: false
          - target_file: targets/2025-12.target
            resolve_with_ee_constraints: false
          - target_file: targets/2026-03.target
            resolve_with_ee_constraints: false

    name: Build on ${{ matrix.target_file }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9
      - name: Build with Maven
        run: >
          mvn -B clean verify -ntp
          "-Dtarget.platform.file=${{ matrix.target_file }}"
          "-Dtarget.resolve.with.ee.constraints=${{ matrix.resolve_with_ee_constraints }}"
