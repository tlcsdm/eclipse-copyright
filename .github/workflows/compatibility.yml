name: Eclipse multi-version compatibility

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [2024-06, 2024-09, 2024-12, 2025-03, 2025-06, 2025-09, 2025-12, 2026-03]

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - name: Build with Maven
        run: mvn -B clean verify -ntp "-Dtarget.platform.file=targets/${{ matrix.target }}.target" "-Dtarget.resolve.with.ee.constraints=true"
